{% extends "base.html" %}

{% block title %}
Login
{% endblock %}

{% block content %}

  <h1>Login</h1>

  <form method="POST" action="{{ url_for('login') }}">

      <label for="email">
          E-Mail
      </label>

      <input type="email" id="email" name="email" required>

      <label for="password">
          Passwort
      </label>

      <input type="password" id="password" name="password" required>

      <button type="submit">
          Login
      </button>

  </form>

  {% if error %}
  <p class="error">
      {{ error }}
  </p>
  {% endif %}

{% endblock %}
