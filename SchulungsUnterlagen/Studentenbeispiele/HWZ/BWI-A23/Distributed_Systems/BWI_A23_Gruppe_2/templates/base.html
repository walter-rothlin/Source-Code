
<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <title>{% block title %}Flask Projekt{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
  <nav>
      <a href="{{ url_for('home') }}">Home</a>
      <a href="{{ url_for('kontakt') }}">Kontakt</a>
      {% if session.get('user') %}
          <a href="{{ url_for('adress_liste') }}">
              Adress-Liste
          </a>
          <a href="{{ url_for('logout') }}">
              Logout
          </a>
          <span class="user-info">
              {{ session['user'] }}
          </span>
      {% else %}
          <a href="{{ url_for('login_page') }}">
              Login
          </a>
      {% endif %}
  </nav>

  <div class="container">

      {% block content %}
      {% endblock %}

  </div>

</body>
</html>
