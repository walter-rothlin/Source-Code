{% extends "base.html" %}

{% block title %}Login - BWI A23 Gruppe 4{% endblock %}

{% block content %}
    <h1>Login</h1>

    {% if fehler %}
        <div class="alert alert-danger">{{ fehler }}</div>
    {% endif %}


    <form method="post" action="{{ url_for('login') }}" class="mt-3" style="max-width: 400px;">
        <div class="mb-3">
            <label for="email" class="form-label">E-Mail-Adresse</label>
            <input type="email" class="form-control" id="email" name="email" required>
        </div>

        <div class="mb-3">
            <label for="passwort" class="form-label">Passwort</label>
            <input type="password" class="form-control" id="passwort" name="passwort" required>
            <div class="form-text">Das Passwort muss länger als 5 Zeichen sein.</div>
        </div>

        <button type="submit" class="btn btn-primary">Login</button>
    </form>
{% endblock %}
