<!-- Passwort-Vergessen-Modal: E-Mail + Button 'Passwort zurücksetzen'. -->
<div class="modal fade" id="forgotModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="static" data-bs-keyboard="false">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Passwort vergessen</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Schliessen"></button>
            </div>
            <form method="post" action="{{ url_for('password_forgot') }}" novalidate>
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="forgot-email" class="form-label">E-Mail-Adresse</label>
                        <input type="email" class="form-control {% if forgot_errors.email %}is-invalid{% endif %}"
                               id="forgot-email" name="email" value="{{ forgot_email }}">
                        {% if forgot_errors.email %}
                        <div class="invalid-feedback">{{ forgot_errors.email }}</div>
                        {% endif %}
                    </div>
                    <a href="#" class="small" data-switch-modal="#loginModal">Zurück zum Login</a>
                </div>
                <div class="modal-footer">
                    <button type="submit" class="btn btn-primary w-100">Passwort zurücksetzen</button>
                </div>
            </form>
        </div>
    </div>
</div>
